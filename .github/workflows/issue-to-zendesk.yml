name: Sync GitHub Issues to Zendesk
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update Zendesk ticket
        env:
          ZD_SUBDOMAIN: ${{ secrets.ZENDESK_SUBDOMAIN }}
          ZD_EMAIL: ${{ secrets.ZENDESK_EMAIL }}
          ZD_TOKEN: ${{ secrets.ZENDESK_API_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            # Build JSON payload safely with jq
            PAYLOAD=$(jq -n \
              --arg subj "GitHub Issue #${{ github.event.issue.number }}: $(echo '${{ github.event.issue.title }}' | head -c 200)" \
              --arg body "${{ github.event.issue.body }}" \
              --arg extid "${{ github.event.issue.number }}" \
              '{ticket: {subject: $subj, comment: {body: $body}, external_id: $extid, tags: ["github"]}}')

            curl -sf -X POST \
              "https://${ZD_SUBDOMAIN}.zendesk.com/api/v2/tickets.json" \
              -H "Content-Type: application/json" \
              -u "${ZD_EMAIL}/token:${ZD_TOKEN}" \
              -d "$PAYLOAD"

          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            # Find existing ticket by external_id
            TICKET_ID=$(curl -sf \
              "https://${ZD_SUBDOMAIN}.zendesk.com/api/v2/search.json?query=type:ticket+external_id:${{ github.event.issue.number }}" \
              -u "${ZD_EMAIL}/token:${ZD_TOKEN}" | jq -r '.results[0].id')

            if [ "$TICKET_ID" != "null" ] && [ -n "$TICKET_ID" ]; then
              PAYLOAD=$(jq -n \
                --arg body "Comment by @${{ github.event.comment.user.login }}:\n\n${{ github.event.comment.body }}" \
                '{ticket: {comment: {body: $body, public: true}}}')

              curl -sf -X PUT \
                "https://${ZD_SUBDOMAIN}.zendesk.com/api/v2/tickets/${TICKET_ID}.json" \
                -H "Content-Type: application/json" \
                -u "${ZD_EMAIL}/token:${ZD_TOKEN}" \
                -d "$PAYLOAD"
            fi
          fi
